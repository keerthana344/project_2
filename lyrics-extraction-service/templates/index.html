<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyrics Extraction App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d0d0d, #1a1a2e, #2d1b69);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            width: 550px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 30px; font-size: 1.5rem; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; opacity: 0.8; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: #fff;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: #9b59b6; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(155,89,182,0.4); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .lyrics-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }
        .lyrics-box.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Lyrics Extractor</h1>
        <label for="artist">Artist:</label>
        <input id="artist" type="text" placeholder="e.g. Coldplay">
        <label for="song">Song Title:</label>
        <input id="song" type="text" placeholder="e.g. Yellow">
        <button id="fetchBtn" onclick="fetchLyrics()">Get Lyrics</button>
        <div class="lyrics-box" id="lyrics"></div>
    </div>
    <script>
        async function fetchLyrics() {
            const artist = document.getElementById('artist').value;
            const song = document.getElementById('song').value;
            const btn = document.getElementById('fetchBtn');
            const lyricsBox = document.getElementById('lyrics');
            if (!artist || !song) { alert('Please fill in both fields.'); return; }
            btn.disabled = true; btn.textContent = 'Fetching...';
            try {
                const res = await fetch(`/lyrics?artist=${encodeURIComponent(artist)}&song_title=${encodeURIComponent(song)}`);
                const data = await res.json();
                if (res.ok) {
                    lyricsBox.textContent = data.lyrics;
                    lyricsBox.classList.add('show');
                } else {
                    lyricsBox.textContent = 'Error: ' + (data.detail || 'Lyrics not found');
                    lyricsBox.classList.add('show');
                }
            } catch (e) {
                lyricsBox.textContent = 'Network error: ' + e.message;
                lyricsBox.classList.add('show');
            }
            btn.disabled = false; btn.textContent = 'Get Lyrics';
        }
    </script>
</body>
</html>
